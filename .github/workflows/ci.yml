name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          echo "Repository structure:" && ls -R

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          if [ -f package.json ] && grep -q '"test"' package.json; then npm test; else echo "No test script"; fi

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build React App
        working-directory: ./frontend
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then npm run build; else echo "No build script"; fi

